name: Build & Deploy to AWS S3

on:
  push:
    branches: [main]
  # Triggered by Sanity webhook via repository_dispatch
  repository_dispatch:
    types: [sanity-content-update]

permissions:
  id-token: write   # OIDC token for AWS
  contents: read

jobs:
  deploy:
    name: Build → S3 → CloudFront
    runs-on: ubuntu-latest
    # AWS deploy credentials live as environment secrets here, not as
    # repository secrets, so the job must opt into the environment to
    # see them.
    environment: nexthire-india

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # The /studio route hosts Sanity Studio (a SPA). It pulls in `sanity`
      # which requires React 19's compiler-runtime; the rest of the site is
      # on React 18. Static export tries to build every route, so we drop
      # this dev-only route before building. Local `next dev` is unaffected.
      - name: Strip dev-only Studio route from export build
        run: rm -rf src/app/studio

      - name: Build (static export)
        run: npm run build
        env:
          # NEXT_PUBLIC_* values are bundled into the client JS and visible
          # in every browser — they are public configuration, not secrets.
          # Hardcoded here so a missing repo-secret can't break the build.
          NEXT_PUBLIC_SANITY_PROJECT_ID: 5lcdhip2
          NEXT_PUBLIC_SANITY_DATASET:    production
          # Search engine site-verification tokens (meta-tag method).
          # Public values — they appear in every page's <head>.
          NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: sVimduq0jOM2Yb2SvaSMhgZlpqvJKB2KUbsVcjNxpQE

      - name: Debug OIDC token claims (sub / aud / repo)
        run: |
          TOKEN=$(curl -sLS "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | jq -r '.value')
          echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq '{sub, aud, repository, ref, environment}'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}
          # The default behavior sends 7 session tags, which requires the
          # trust policy to allow sts:TagSession. We skip them so the role
          # only needs sts:AssumeRoleWithWebIdentity.
          role-skip-session-tagging: true

      - name: Sync to S3
        run: |
          # Pass 1: assets (CSS/JS/images/fonts) with long cache; --delete cleans up removed assets
          aws s3 sync out/ s3://${{ secrets.AWS_S3_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.xml" \
            --exclude "*.txt"
          # Pass 2: HTML/JSON/sitemap/robots with short cache; --delete cleans up removed routes
          aws s3 sync out/ s3://${{ secrets.AWS_S3_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=0,must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --include "*.xml" \
            --include "*.txt"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # Push all sitemap URLs to IndexNow (Bing, Yandex, Naver, Seznam) so
      # they re-crawl within minutes. Soft-fails — won't break the deploy.
      - name: Ping IndexNow
        run: node scripts/indexnow.mjs
        continue-on-error: true
